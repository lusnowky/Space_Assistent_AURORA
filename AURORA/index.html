<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>SpaceShip System</title>
    
</head>
<body class="monitor">

    <h1>AURORA</h1> <br>
    <h4>Olá, eu sou AURORA, sua assistente de monitoramento espacial</h4>
    <h4>Vamos analisar os sistemas da nave para garantir uma viagem segura e eficiente!</h4>
    <hr>

    <h2>Sistema de Comunicação</h2>

    <div class="status_comunicacao">
        <input  type="checkbox" id="comunicacao" placeholder="Status da Comunicação">
        <label  for="comunicacao"></label>
    </div>

    <input      type="number" id="temperatura" placeholder="Temperatura (°C)">
    <input      type="number" id="energia" placeholder="Energia (%)"> <br>
    
    <div class ="botoes">
    <button     onclick="iniciarAnalise()">Iniciar Análise</button>
    <button     onclick="statusNave()">Ver Status</button>
    <button     onclick="mostrarHistorico()">Mostrar Histórico</button>
    </div>

    <div id="saida"></div>

    <script src="script.js"></script>

</body>
</html>
